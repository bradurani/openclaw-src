name: deploy

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'config/**'
      - 'skills/**'
      - 'openclaw/**'
      - 'script/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      base_image_tag:
        description: "Base image tag override (e.g. v0.5.0). Leave blank to use latest."
        required: false

permissions:
  id-token: write   # AWS OIDC
  contents: read
  pull-requests: read  # needed for /commits/{sha}/pulls label lookup

env:
  AWS_REGION: us-west-2
  ECR_BASE_REPO: openclaw
  ECR_SRC_REPO: openclaw-src
  ECS_CLUSTER: openclaw
  ECS_SERVICE: openclaw
  ECS_TASK_FAMILY: openclaw
  CONTAINER_NAME: openclaw

jobs:
  check-skip:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.skip.outputs.skip }}
      upgrade_openclaw: ${{ steps.skip.outputs.upgrade_openclaw }}
    steps:
      - name: Check skip-deploy label
        id: skip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "upgrade_openclaw=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract PR number from squash-merge commit message "title (#N)"
          # and look up labels directly — avoids the /commits/{sha}/pulls
          # indexing race where the association isn't ready yet.
          COMMIT_MSG=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/git/commits/${{ github.sha }}" \
            --jq '.message' | head -1)

          PR_NUM=$(echo "$COMMIT_MSG" | grep -oE '\(#([0-9]+)\)$' | tr -dc '0-9' || true)

          SKIP="false"
          UPGRADE="false"

          if [ -n "$PR_NUM" ]; then
            echo "Resolved PR #${PR_NUM} from merge commit message"
            LABELS=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/pulls/${PR_NUM}" \
              --jq '[.labels[].name]')

            if echo "$LABELS" | jq -e '.[] | select(. == "skip deploy")' >/dev/null 2>&1; then
              SKIP="true"
              echo "### Deploy skipped (label: skip deploy) :no_entry_sign:" >> "$GITHUB_STEP_SUMMARY"
            fi
            if echo "$LABELS" | jq -e '.[] | select(. == "upgrade openclaw")' >/dev/null 2>&1; then
              UPGRADE="true"
              echo "### Base image upgrade requested (label: upgrade openclaw) :arrow_up:" >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No PR number found in commit message — skipping label checks"
          fi

          echo "skip=${SKIP}" >> "$GITHUB_OUTPUT"
          echo "upgrade_openclaw=${UPGRADE}" >> "$GITHUB_OUTPUT"

  build-and-deploy:
    needs: check-skip
    if: needs.check-skip.outputs.skip != 'true'
    runs-on: ubuntu-latest

    # Gate deploy credentials behind GitHub Environment approvals
    environment: prod

    steps:
      - name: Record deploy start time
        id: deploy-start
        run: |
          echo "iso=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "epoch=$(date -u +%s)" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4

      - name: Resolve deployed PR info (if any)
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PRS=$(gh api -H "Accept: application/vnd.github+json" "/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls")
          PR_URL=$(echo "$PRS" | jq -r ".[0].html_url // empty")
          PR_NUMBER=$(echo "$PRS" | jq -r ".[0].number // empty")
          PR_TITLE=$(echo "$PRS" | jq -r ".[0].title // empty")
          PR_MERGED=$(echo "$PRS" | jq -r ".[0].merged // empty")
          PR_LABELS=$(echo "$PRS" | jq -c "([.[0].labels[]?.name] // [])")

          # Heuristic: whether this deploy was intended to upgrade upstream OpenClaw.
          # - If the triggering PR has label "upgrade openclaw" OR
          # - The workflow was manually dispatched with base_image_tag override.
          UPGRADE_LABEL=$(echo "$PRS" | jq -r "([.[0].labels[]?.name] | any(. == \"upgrade openclaw\")) // false")
          BASE_OVERRIDE="${{ github.event.inputs.base_image_tag }}"
          if [ "$UPGRADE_LABEL" = "true" ] || [ -n "$BASE_OVERRIDE" ]; then
            UPGRADED_OPENCLAW=true
          else
            UPGRADED_OPENCLAW=false
          fi

          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "title=$PR_TITLE" >> "$GITHUB_OUTPUT"
          echo "merged=$PR_MERGED" >> "$GITHUB_OUTPUT"
          echo "labels=$PR_LABELS" >> "$GITHUB_OUTPUT"
          echo "upgraded_openclaw=$UPGRADED_OPENCLAW" >> "$GITHUB_OUTPUT"

      - name: Compute context hash
        id: ctx
        run: |
          HASH=$(python3 - <<'PY'
          import hashlib, subprocess
          patterns = [
              "Dockerfile",
              "config/**",
              "skills/**",
              "openclaw/**",
              "script/**",
              ".github/workflows/deploy.yml",
              ".github/workflows/build-image.yml",
          ]
          cmd = ["git", "ls-files", "--"] + patterns
          files = subprocess.check_output(cmd, text=True).splitlines()
          files = sorted(set(f for f in files if f))
          h = hashlib.sha256()
          for path in files:
              h.update(path.encode("utf-8"))
              h.update(b"\0")
              with open(path, "rb") as f:
                  h.update(f.read())
              h.update(b"\0")
          print(h.hexdigest())
          PY
          )
          echo "hash=${HASH}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEPLOY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Prepare upstream openclaw checkout
        if: needs.check-skip.outputs.upgrade_openclaw == 'true'
        run: |
          git clone --no-checkout --filter=blob:none https://github.com/openclaw/openclaw ../openclaw
          cd ../openclaw && git fetch --tags origin

      - name: Upgrade openclaw base image
        if: needs.check-skip.outputs.upgrade_openclaw == 'true'
        env:
          OPENCLAW_SKIP_FETCH_ENV: "1"
        run: |
          chmod +x script/update-base-image.sh
          script/update-base-image.sh

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tags
        id: tags
        run: |
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          CTX_TAG="ctx-${{ steps.ctx.outputs.hash }}"

          echo "short=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "ctx=${CTX_TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${{ env.ECR_SRC_REPO }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "ctx_image=${REGISTRY}/${{ env.ECR_SRC_REPO }}:${CTX_TAG}" >> "$GITHUB_OUTPUT"

      - name: Check if context image already exists
        id: image-exists
        run: |
          if [[ "${{ needs.check-skip.outputs.upgrade_openclaw }}" == "true" ]]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "upgrade openclaw label detected; forcing derived image rebuild."
            exit 0
          fi

          set +e
          aws ecr describe-images \
            --repository-name "${{ env.ECR_SRC_REPO }}" \
            --image-ids imageTag="${{ steps.tags.outputs.ctx }}" \
            --query 'imageDetails[0].imageDigest' \
            --output text >/dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
          set -e

      - name: Reuse existing context image
        if: steps.image-exists.outputs.exists == 'true'
        run: |
          echo "Context image already exists: ${{ steps.tags.outputs.ctx_image }}"

      - name: Resolve base image
        id: base
        run: |
          REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          REPO="${{ env.ECR_BASE_REPO }}"

          if [[ -n "${{ github.event.inputs.base_image_tag }}" ]]; then
            TAG="${{ github.event.inputs.base_image_tag }}"
          else
            # Find the latest tag by pushed date
            TAG=$(aws ecr describe-images \
              --repository-name "$REPO" \
              --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' \
              --output text)
          fi

          DIGEST=$(aws ecr describe-images \
            --repository-name "$REPO" \
            --image-ids imageTag="$TAG" \
            --query "imageDetails[0].imageDigest" \
            --output text)

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image=${REGISTRY}/${REPO}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using base image: ${REGISTRY}/${REPO}:${TAG} (${DIGEST})"

      - name: Set up Docker Buildx
        if: steps.image-exists.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build derived image
        id: build
        if: steps.image-exists.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          build-args: BASE_IMAGE=${{ steps.base.outputs.image }}
          tags: ${{ steps.tags.outputs.ctx_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push to ECR
        if: steps.image-exists.outputs.exists != 'true'
        run: |
          docker push ${{ steps.tags.outputs.ctx_image }}

      - name: Check if image changed
        id: check
        run: |
          # Get the digest of the image currently running in ECS
          CURRENT_IMAGE=$(aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query "taskDefinition.containerDefinitions[?name=='${{ env.CONTAINER_NAME }}'].image | [0]" \
            --output text)

          # Get the digest of the context image for this commit
          NEW_DIGEST=$(aws ecr describe-images \
            --repository-name ${{ env.ECR_SRC_REPO }} \
            --image-ids imageTag=${{ steps.tags.outputs.ctx }} \
            --query 'imageDetails[0].imageDigest' \
            --output text)

          # Get the digest of the currently deployed image
          CURRENT_TAG=$(echo "$CURRENT_IMAGE" | awk -F: '{print $2}')
          CURRENT_DIGEST=$(aws ecr describe-images \
            --repository-name ${{ env.ECR_SRC_REPO }} \
            --image-ids imageTag="${CURRENT_TAG}" \
            --query 'imageDetails[0].imageDigest' \
            --output text 2>/dev/null || echo "none")

          echo "new_digest=${NEW_DIGEST}" >> "$GITHUB_OUTPUT"
          echo "current_digest=${CURRENT_DIGEST}" >> "$GITHUB_OUTPUT"

          if [[ "$NEW_DIGEST" == "$CURRENT_DIGEST" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Image unchanged (${NEW_DIGEST}), skipping deploy."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Image changed: ${CURRENT_DIGEST} → ${NEW_DIGEST}"
          fi

      - name: Tag image for deployment
        if: steps.check.outputs.changed == 'true'
        run: |
          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "${{ env.ECR_SRC_REPO }}" \
            --image-ids imageTag="${{ steps.tags.outputs.ctx }}" \
            --query 'images[0].imageManifest' \
            --output text)

          aws ecr put-image \
            --repository-name "${{ env.ECR_SRC_REPO }}" \
            --image-tag "${{ steps.tags.outputs.short }}" \
            --image-manifest "$MANIFEST"

          aws ecr put-image \
            --repository-name "${{ env.ECR_SRC_REPO }}" \
            --image-tag "latest" \
            --image-manifest "$MANIFEST"

      - name: Update ECS task definition
        if: steps.check.outputs.changed == 'true'
        id: task-def
        run: |
          # Fetch current task definition
          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query 'taskDefinition')

          # Update the image in the container definition
          NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
            --arg IMAGE "${{ steps.tags.outputs.image }}" \
            --arg CONTAINER "${{ env.CONTAINER_NAME }}" \
            '.containerDefinitions |= map(if .name == $CONTAINER then .image = $IMAGE else . end)')

          # Strip fields that can't be included in register-task-definition
          NEW_TASK_DEF=$(echo "$NEW_TASK_DEF" | jq 'del(
            .taskDefinitionArn,
            .revision,
            .status,
            .requiresAttributes,
            .compatibilities,
            .registeredAt,
            .registeredBy
          )')

          # Register the new task definition
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "arn=${NEW_ARN}" >> "$GITHUB_OUTPUT"
          echo "Registered task definition: ${NEW_ARN}"

      - name: Deploy to ECS
        if: steps.check.outputs.changed == 'true'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --task-definition ${{ steps.task-def.outputs.arn }} \
            --force-new-deployment

      - name: Wait for deployment
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }}
          echo "Deployment complete!"

      - name: Write deploy manifest
        id: manifest
        if: always()
        env:
          REPO: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          SERVER_URL: ${{ github.server_url }}
          JOB_STATUS: ${{ job.status }}

          DEPLOY_START_ISO: ${{ steps.deploy-start.outputs.iso }}
          DEPLOY_START_EPOCH: ${{ steps.deploy-start.outputs.epoch }}

          CONTEXT_HASH: ${{ steps.ctx.outputs.hash }}

          PR_URL: ${{ steps.pr.outputs.url }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_MERGED: ${{ steps.pr.outputs.merged }}
          PR_LABELS_JSON: ${{ steps.pr.outputs.labels }}
          UPGRADED_OPENCLAW: ${{ steps.pr.outputs.upgraded_openclaw }}

          BASE_IMAGE: ${{ steps.base.outputs.image }}
          BASE_IMAGE_TAG: ${{ steps.base.outputs.tag }}
          BASE_IMAGE_DIGEST: ${{ steps.base.outputs.digest }}

          SRC_IMAGE: ${{ steps.tags.outputs.image }}
          SRC_IMAGE_SHORT: ${{ steps.tags.outputs.short }}
          SRC_IMAGE_CTX_TAG: ${{ steps.tags.outputs.ctx }}
          SRC_IMAGE_CTX_IMAGE: ${{ steps.tags.outputs.ctx_image }}

          CHANGED: ${{ steps.check.outputs.changed }}
          NEW_DIGEST: ${{ steps.check.outputs.new_digest }}
          CURRENT_DIGEST: ${{ steps.check.outputs.current_digest }}

          TASK_DEF_ARN: ${{ steps.task-def.outputs.arn }}

          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          ECS_SERVICE: ${{ env.ECS_SERVICE }}
          ECS_TASK_FAMILY: ${{ env.ECS_TASK_FAMILY }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          set -euo pipefail

          DEPLOY_END_ISO=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          DEPLOY_END_EPOCH=$(date -u +%s)
          RUN_URL="$SERVER_URL/$REPO/actions/runs/$RUN_ID"

          CHANGED_VAL="${CHANGED:-}"
          if [ -z "$CHANGED_VAL" ]; then CHANGED_VAL="unknown"; fi

          if [ -z "${PR_LABELS_JSON:-}" ]; then PR_LABELS_JSON='[]'; fi

          BASE_OPENCLAW_GIT_SHA=""
          if [ "${UPGRADED_OPENCLAW:-}" = "true" ]; then
            # build-base-image workflow tags base images like <ref>-<shortsha> (e.g. main-1a2b3c4)
            # Extract the suffix after the last dash if it looks like a hex sha.
            CANDIDATE="${BASE_IMAGE_TAG##*-}"
            if echo "$CANDIDATE" | grep -Eq "^[0-9a-f]{7,40}$"; then
              BASE_OPENCLAW_GIT_SHA="$CANDIDATE"
            fi
          fi

          jq -n \
            --arg repo "$REPO" \
            --arg commit_sha "$COMMIT_SHA" \
            --arg run_id "$RUN_ID" \
            --arg run_attempt "$RUN_ATTEMPT" \
            --arg run_url "$RUN_URL" \
            --arg status "$JOB_STATUS" \
            --arg deploy_start_iso "$DEPLOY_START_ISO" \
            --arg deploy_start_epoch "$DEPLOY_START_EPOCH" \
            --arg deploy_end_iso "$DEPLOY_END_ISO" \
            --arg deploy_end_epoch "$DEPLOY_END_EPOCH" \
            --arg context_hash "$CONTEXT_HASH" \
            --arg pr_url "$PR_URL" \
            --arg pr_number "$PR_NUMBER" \
            --arg pr_title "$PR_TITLE" \
            --arg pr_merged "$PR_MERGED" \
            --argjson pr_labels "$PR_LABELS_JSON" \
            --arg upgraded_openclaw "$UPGRADED_OPENCLAW" \
            --arg base_image "$BASE_IMAGE" \
            --arg base_image_tag "$BASE_IMAGE_TAG" \
            --arg base_image_digest "$BASE_IMAGE_DIGEST" \
            --arg base_openclaw_git_sha "$BASE_OPENCLAW_GIT_SHA" \
            --arg src_image "$SRC_IMAGE" \
            --arg src_image_short "$SRC_IMAGE_SHORT" \
            --arg src_image_ctx_tag "$SRC_IMAGE_CTX_TAG" \
            --arg src_image_ctx_image "$SRC_IMAGE_CTX_IMAGE" \
            --arg changed "$CHANGED_VAL" \
            --arg new_digest "$NEW_DIGEST" \
            --arg current_digest "$CURRENT_DIGEST" \
            --arg task_def_arn "$TASK_DEF_ARN" \
            --arg ecs_cluster "$ECS_CLUSTER" \
            --arg ecs_service "$ECS_SERVICE" \
            --arg ecs_task_family "$ECS_TASK_FAMILY" \
            --arg aws_region "$AWS_REGION" \
            '{
              schemaVersion: 1,
              generatedAt: (now | todateiso8601),
              repo: $repo,
              commitSha: $commit_sha,
              run: { id: $run_id, attempt: $run_attempt, url: $run_url },
              deploy: {
                startTime: { iso: $deploy_start_iso, epoch: ($deploy_start_epoch|tonumber?) },
                endTime: { iso: $deploy_end_iso, epoch: ($deploy_end_epoch|tonumber?) },
                status: $status,
                changed: $changed
              },
              pr: {
                url: ($pr_url | select(length>0) // null),
                number: ($pr_number | select(length>0) | tonumber? // null),
                title: ($pr_title | select(length>0) // null),
                merged: ($pr_merged | select(length>0) // null),
                labels: $pr_labels
              },
              images: {
                derived: {
                  image: $src_image,
                  tag: $src_image_short,
                  contextTag: $src_image_ctx_tag,
                  contextImage: $src_image_ctx_image,
                  digestNew: ($new_digest | select(length>0) // null),
                  digestPrevious: ($current_digest | select(length>0) // null)
                },
                base: {
                  image: ($base_image | select(length>0) // null),
                  tag: ($base_image_tag | select(length>0) // null),
                  digest: ($base_image_digest | select(length>0) // null),
                  openclawGitSha: ($base_openclaw_git_sha | select(length>0) // null)
                }
              },
              ecs: {
                cluster: $ecs_cluster,
                service: $ecs_service,
                taskFamily: $ecs_task_family,
                taskDefinitionArn: ($task_def_arn | select(length>0) // null),
                region: $aws_region
              },
              flags: {
                upgradedOpenClaw: ($upgraded_openclaw == "true")
              },
              contextHash: $context_hash
            }' > deploy-manifest.json

          echo "wrote=deploy-manifest.json" >> "$GITHUB_OUTPUT"
          echo "end_iso=$DEPLOY_END_ISO" >> "$GITHUB_OUTPUT"

      - name: Upload deploy manifest artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-manifest-${{ github.sha }}
          path: deploy-manifest.json
          if-no-files-found: error

      - name: Upload deploy manifest to S3 (artifacts bucket)
        if: always()
        env:
          ARTIFACTS_BUCKET: uranisoftware-openclaw-artifacts
        run: |
          set -euo pipefail
          KEY="deploy-manifests/${{ github.sha }}/${{ github.run_id }}-${{ github.run_attempt }}.json"
          aws s3 cp deploy-manifest.json "s3://$ARTIFACTS_BUCKET/$KEY"
          echo "Uploaded: s3://$ARTIFACTS_BUCKET/$KEY"

      - name: Summary
        run: |
          if [[ "${{ steps.check.outputs.changed }}" == "true" ]]; then
            echo "### Deployment successful :rocket:" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "### Image unchanged — deploy skipped :white_check_mark:" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Detail | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ steps.tags.outputs.image }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Context Tag** | \`${{ steps.tags.outputs.ctx }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Base** | \`${{ steps.base.outputs.image }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Deployed** | \`${{ steps.check.outputs.changed }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Commit** | \`${{ github.sha }}\` |" >> "$GITHUB_STEP_SUMMARY"
