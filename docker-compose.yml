# Local development docker-compose for openclaw-src
#
# Prerequisites:
#   1. Build the upstream base image first (one-time):
#        cd ../openclaw && docker build -t openclaw:local .
#   2. Secrets are resolved at runtime via the native SecretRef exec provider
#      (script/aws-sm-resolver), which calls AWS Secrets Manager directly.
#      No .env file is needed for OpenClaw credentials.
#
# Usage:
#   docker compose up openclaw-gateway    # start gateway (foreground)
#   docker compose run --rm openclaw-cli  # interactive CLI session
#   docker compose run --rm remote-cli nodes pending
#   docker compose run --rm remote-cli nodes approve <requestId>
#   script/psql                           # psql shell to remote RDS

services:
  # --------------------------------------------------------------------------
  # OpenClaw gateway
  # --------------------------------------------------------------------------
  openclaw-gateway:
    build:
      context: .
      args:
        BASE_IMAGE: openclaw:local
    image: openclaw-src:local
    environment:
      HOME: /home/node
      TERM: xterm-256color
      AWS_REGION: ${AWS_REGION:-us-west-2}
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    init: true
    restart: unless-stopped
    command:
      [
        "openclaw",
        "gateway",
        "run",
        "--allow-unconfigured",
        "--bind",
        "lan",
        "--port",
        "18789",
      ]
    volumes:
      - ~/.openclaw:/home/node/.openclaw

  # --------------------------------------------------------------------------
  # OpenClaw CLI (interactive, run with: docker compose run --rm openclaw-cli)
  # --------------------------------------------------------------------------
  openclaw-cli:
    build:
      context: .
      args:
        BASE_IMAGE: openclaw:local
    image: openclaw-src:local
    environment:
      OPENCLAW_GATEWAY_URL: http://openclaw-gateway:18789
      HOME: /home/node
      TERM: xterm-256color
      BROWSER: echo
      AWS_REGION: ${AWS_REGION:-us-west-2}
    depends_on:
      - openclaw-gateway
    stdin_open: true
    tty: true
    init: true
    profiles:
      - cli
    entrypoint: ["openclaw"]

  # --------------------------------------------------------------------------
  # Remote CLI — run commands against the ECS gateway via WebSocket
  # Usage: docker compose run --rm remote-cli nodes pending
  #        docker compose run --rm remote-cli nodes approve <requestId>
  #        docker compose run --rm remote-cli devices list
  #        docker compose run --rm remote-cli health
  #        docker compose run --rm remote-cli gateway call node.list
  # --------------------------------------------------------------------------
  remote-cli:
    build:
      context: .
      args:
        BASE_IMAGE: openclaw:local
    image: openclaw-src:local
    environment:
      HOME: /home/node
      TERM: xterm-256color
      BROWSER: echo
      OPENCLAW_GATEWAY_URL: "wss://gateway.uranisoftware.com"
      AWS_REGION: ${AWS_REGION:-us-west-2}
    stdin_open: true
    tty: true
    init: true
    profiles:
      - tools
    entrypoint:
      [
        "sh",
        "-c",
        "if [ $$# -eq 0 ]; then exec openclaw tui; else exec openclaw \"$$@\"; fi",
        "--",
      ]

  # --------------------------------------------------------------------------
  # psql — interactive shell to remote RDS (fetches credentials from AWS SM)
  # Prefer script/psql for direct use without docker.
  # Usage: PGVECTOR_URL=<url> docker compose run --rm psql
  # --------------------------------------------------------------------------
  psql:
    image: postgres:16
    environment:
      PGVECTOR_URL: ${PGVECTOR_URL}
    stdin_open: true
    tty: true
    profiles:
      - tools
    entrypoint: ["sh", "-c", "exec psql \"$$PGVECTOR_URL\" \"$$@\"", "--"]
